<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shaikhu Calculator</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#f3f4f6',
                            dark: '#111827',
                            primary: '#3b82f6',
                            accent: '#f97316',
                        }
                    },
                    boxShadow: {
                        'neumorphic-light': '8px 8px 16px #d1d5db, -8px -8px 16px #ffffff',
                        'neumorphic-dark': '8px 8px 16px #0b0f19, -8px -8px 16px #172135',
                        'neumorphic-inner-light': 'inset 4px 4px 8px #d1d5db, inset -4px -4px 8px #ffffff',
                        'neumorphic-inner-dark': 'inset 4px 4px 8px #0b0f19, inset -4px -4px 8px #172135',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            /* Prevents double-tap to zoom on mobile */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        .calc-btn {
            transition: all 0.15s ease-in-out;
        }
        
        .calc-btn:active {
            transform: scale(0.92);
        }

        /* Custom Scrollbar for Display */
        .display-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .display-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .display-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 10px;
        }

        /* Dynamic text sizing */
        #current-operand {
            word-wrap: break-word;
            word-break: break-all;
        }
    </style>
</head>
<body class="bg-gray-200 dark:bg-gray-950 min-h-screen flex items-center justify-center p-4 transition-colors duration-500 font-sans">

    <!-- App Container -->
    <main class="w-full max-w-[380px] bg-gray-100 dark:bg-gray-900 rounded-[3rem] shadow-2xl dark:shadow-[0_20px_50px_rgba(0,0,0,0.7)] border-[6px] border-white dark:border-gray-800 flex flex-col relative overflow-hidden transition-colors duration-500">
        
        <!-- Top Header Bar -->
        <header class="flex items-center justify-between px-6 py-4 bg-white/50 dark:bg-gray-800/50 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 relative z-10">
            <div class="flex items-center gap-3">
                <!-- Logo with 4:4 ratio (aspect-square) -->
                <div class="w-10 h-10 rounded-xl overflow-hidden shadow-sm bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 flex items-center justify-center p-0.5">
                    <img 
                        src="shaikhulogo.webp" 
                        alt="Shaikhu Logo" 
                        class="w-full h-full object-cover rounded-lg aspect-square"
                        onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><rect width=\'100\' height=\'100\' fill=\'%233b82f6\'/><text x=\'50\' y=\'50\' font-family=\'Arial\' font-size=\'40\' fill=\'white\' dominant-baseline=\'middle\' text-anchor=\'middle\'>S</text></svg>'"
                    />
                </div>
                <div>
                    <h1 class="text-sm font-bold text-gray-800 dark:text-gray-100 leading-tight">shaikhu</h1>
                    <span class="text-[10px] uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium">Calculator</span>
                </div>
            </div>
            
            <!-- Dashboard Button -->
            <a href="../index.html" style="background: #1e3a8a; color: white; padding: 6px 10px; text-decoration: none; border-radius: 50px; font-family: sans-serif; font-weight: bold; font-size: 9px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); transition: all 0.3s; white-space: nowrap; margin-left: auto; margin-right: 12px;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                ← Back to Dashboard
            </a>
            
            <!-- Theme Toggle Button -->
            <button id="theme-toggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-700 transition-colors focus:outline-none flex-shrink-0">
                <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
            </button>
        </header>

        <!-- Display Area -->
        <div class="px-6 py-8 flex flex-col justify-end items-end relative min-h-[160px] bg-transparent">
            <div id="previous-operand" class="text-gray-500 dark:text-gray-400 text-lg font-medium h-7 overflow-hidden text-right w-full tracking-wide"></div>
            <div id="current-operand" class="text-gray-900 dark:text-white text-5xl font-bold mt-2 w-full text-right overflow-x-auto display-scroll whitespace-nowrap tracking-tight transition-all">0</div>
        </div>

        <!-- Keypad Area -->
        <div class="px-5 pb-6 pt-2 bg-white dark:bg-gray-800 rounded-t-[2.5rem] flex-grow transition-colors duration-500">
            <div class="grid grid-cols-4 gap-4 mt-4">
                <!-- Row 1 -->
                <button data-action="clear" class="calc-btn col-span-2 h-16 rounded-2xl bg-red-100 dark:bg-red-900/30 text-red-500 dark:text-red-400 font-semibold text-xl shadow-sm hover:bg-red-200 dark:hover:bg-red-900/50">AC</button>
                <button data-action="delete" class="calc-btn h-16 rounded-2xl bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-semibold text-xl shadow-sm hover:bg-gray-200 dark:hover:bg-gray-600 flex items-center justify-center">
                    <i data-lucide="delete" class="w-6 h-6"></i>
                </button>
                <button data-operator="÷" class="calc-btn h-16 rounded-2xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 font-bold text-2xl shadow-sm hover:bg-blue-200 dark:hover:bg-blue-900/50">÷</button>

                <!-- Row 2 -->
                <button data-number="7" class="calc-btn h-16 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-gray-800 dark:text-gray-100 font-semibold text-2xl shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600">7</button>
                <button data-number="8" class="calc-btn h-16 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-gray-800 dark:text-gray-100 font-semibold text-2xl shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600">8</button>
                <button data-number="9" class="calc-btn h-16 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-gray-800 dark:text-gray-100 font-semibold text-2xl shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600">9</button>
                <button data-operator="×" class="calc-btn h-16 rounded-2xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 font-bold text-2xl shadow-sm hover:bg-blue-200 dark:hover:bg-blue-900/50">×</button>

                <!-- Row 3 -->
                <button data-number="4" class="calc-btn h-16 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-gray-800 dark:text-gray-100 font-semibold text-2xl shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600">4</button>
                <button data-number="5" class="calc-btn h-16 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-gray-800 dark:text-gray-100 font-semibold text-2xl shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600">5</button>
                <button data-number="6" class="calc-btn h-16 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-gray-800 dark:text-gray-100 font-semibold text-2xl shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600">6</button>
                <button data-operator="-" class="calc-btn h-16 rounded-2xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 font-bold text-3xl shadow-sm hover:bg-blue-200 dark:hover:bg-blue-900/50">-</button>

                <!-- Row 4 -->
                <button data-number="1" class="calc-btn h-16 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-gray-800 dark:text-gray-100 font-semibold text-2xl shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600">1</button>
                <button data-number="2" class="calc-btn h-16 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-gray-800 dark:text-gray-100 font-semibold text-2xl shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600">2</button>
                <button data-number="3" class="calc-btn h-16 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-gray-800 dark:text-gray-100 font-semibold text-2xl shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600">3</button>
                <button data-operator="+" class="calc-btn h-16 rounded-2xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 font-bold text-2xl shadow-sm hover:bg-blue-200 dark:hover:bg-blue-900/50">+</button>

                <!-- Row 5 -->
                <button data-action="percent" class="calc-btn h-16 rounded-2xl bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-semibold text-xl shadow-sm hover:bg-gray-200 dark:hover:bg-gray-600">%</button>
                <button data-number="0" class="calc-btn h-16 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-gray-800 dark:text-gray-100 font-semibold text-2xl shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600">0</button>
                <button data-number="." class="calc-btn h-16 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-gray-800 dark:text-gray-100 font-bold text-3xl shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600 pb-2">.</button>
                <button data-action="calculate" class="calc-btn h-16 rounded-2xl bg-gradient-to-br from-brand-primary to-indigo-600 text-white font-bold text-3xl shadow-lg hover:shadow-xl hover:opacity-90">=</button>
            </div>
            
            <!-- Footer -->
            <div class="mt-6 pt-4 border-t border-gray-100 dark:border-gray-700/50 text-center">
                <p class="text-[10px] text-gray-400 dark:text-gray-500 leading-tight">
                    develop with love by <span class="font-semibold text-gray-600 dark:text-gray-300">Nusrat shaheen inc.</span><br>
                    contact(<a href="mailto:mnf101.101@gmail.com" class="text-brand-primary dark:text-blue-400 hover:underline">mnf101.101@gmail.com</a>)
                </p>
            </div>
        </div>
    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Theme Setup
        const html = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        
        // Default to dark theme for a premium feel, or check system preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            html.classList.add('dark');
            themeIcon.setAttribute('data-lucide', 'sun');
        } else {
            // Keep light default
            themeIcon.setAttribute('data-lucide', 'moon');
        }
        lucide.createIcons();

        themeToggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
            
            // Add a subtle animation to the body background
            document.body.style.transition = 'background-color 0.5s ease';
        });

        // Calculator Logic
        class Calculator {
            constructor(previousOperandElement, currentOperandElement) {
                this.previousOperandElement = previousOperandElement;
                this.currentOperandElement = currentOperandElement;
                this.clear();
            }

            clear() {
                this.currentOperand = '0';
                this.previousOperand = '';
                this.operation = undefined;
                this.shouldResetScreen = false;
            }

            delete() {
                if (this.currentOperand === '0' || this.currentOperand.length === 1) {
                    this.currentOperand = '0';
                    return;
                }
                this.currentOperand = this.currentOperand.toString().slice(0, -1);
            }

            appendNumber(number) {
                if (this.shouldResetScreen) {
                    this.currentOperand = '';
                    this.shouldResetScreen = false;
                }
                if (number === '.' && this.currentOperand.includes('.')) return;
                if (this.currentOperand === '0' && number !== '.') {
                    this.currentOperand = number.toString();
                } else {
                    this.currentOperand = this.currentOperand.toString() + number.toString();
                }
            }

            chooseOperation(operation) {
                if (this.currentOperand === '') return;
                if (this.previousOperand !== '') {
                    this.compute();
                }
                this.operation = operation;
                this.previousOperand = this.currentOperand;
                this.currentOperand = '';
            }

            compute() {
                let computation;
                const prev = parseFloat(this.previousOperand);
                const current = parseFloat(this.currentOperand);
                if (isNaN(prev) || isNaN(current)) return;
                
                switch (this.operation) {
                    case '+':
                        computation = prev + current;
                        break;
                    case '-':
                        computation = prev - current;
                        break;
                    case '×':
                        computation = prev * current;
                        break;
                    case '÷':
                        if (current === 0) {
                            alert("Cannot divide by zero!");
                            this.clear();
                            return;
                        }
                        computation = prev / current;
                        break;
                    default:
                        return;
                }
                
                // Format decimal to avoid JS floating point errors
                this.currentOperand = Math.round(computation * 100000000) / 100000000;
                this.operation = undefined;
                this.previousOperand = '';
                this.shouldResetScreen = true;
            }

            computePercent() {
                if (this.currentOperand === '') return;
                const current = parseFloat(this.currentOperand);
                if (isNaN(current)) return;
                this.currentOperand = (current / 100).toString();
                this.shouldResetScreen = true;
            }

            getDisplayNumber(number) {
                const stringNumber = number.toString();
                const integerDigits = parseFloat(stringNumber.split('.')[0]);
                const decimalDigits = stringNumber.split('.')[1];
                let integerDisplay;
                if (isNaN(integerDigits)) {
                    integerDisplay = '';
                } else {
                    integerDisplay = integerDigits.toLocaleString('en', { maximumFractionDigits: 0 });
                }
                if (decimalDigits != null) {
                    return `${integerDisplay}.${decimalDigits}`;
                } else {
                    return integerDisplay;
                }
            }

            updateDisplay() {
                // Resize text if it gets too long
                const displayCurrent = this.currentOperandElement;
                if (this.currentOperand.toString().length > 10) {
                    displayCurrent.style.fontSize = '2.25rem'; // smaller
                } else {
                    displayCurrent.style.fontSize = '3rem'; // normal (text-5xl)
                }

                if (this.currentOperand === '0' && this.shouldResetScreen === false) {
                    this.currentOperandElement.innerText = '0';
                } else {
                    this.currentOperandElement.innerText = this.getDisplayNumber(this.currentOperand);
                }

                if (this.operation != null) {
                    this.previousOperandElement.innerText = `${this.getDisplayNumber(this.previousOperand)} ${this.operation}`;
                } else {
                    this.previousOperandElement.innerText = '';
                }
                
                // Auto scroll to right for long numbers
                this.currentOperandElement.scrollLeft = this.currentOperandElement.scrollWidth;
            }
        }

        // Initialize Calculator
        const previousOperandTextElement = document.getElementById('previous-operand');
        const currentOperandTextElement = document.getElementById('current-operand');
        const calculator = new Calculator(previousOperandTextElement, currentOperandTextElement);

        // Event Listeners for UI Buttons
        document.querySelectorAll('[data-number]').forEach(button => {
            button.addEventListener('click', () => {
                calculator.appendNumber(button.dataset.number);
                calculator.updateDisplay();
                triggerHapticFeedback();
            });
        });

        document.querySelectorAll('[data-operator]').forEach(button => {
            button.addEventListener('click', () => {
                calculator.chooseOperation(button.dataset.operator);
                calculator.updateDisplay();
                triggerHapticFeedback();
            });
        });

        document.querySelector('[data-action="calculate"]').addEventListener('click', () => {
            calculator.compute();
            calculator.updateDisplay();
            triggerHapticFeedback();
        });

        document.querySelector('[data-action="clear"]').addEventListener('click', () => {
            calculator.clear();
            calculator.updateDisplay();
            triggerHapticFeedback();
        });

        document.querySelector('[data-action="delete"]').addEventListener('click', () => {
            calculator.delete();
            calculator.updateDisplay();
            triggerHapticFeedback();
        });

        document.querySelector('[data-action="percent"]').addEventListener('click', () => {
            calculator.computePercent();
            calculator.updateDisplay();
            triggerHapticFeedback();
        });

        // Keyboard Support
        document.addEventListener('keydown', e => {
            if (e.key >= 0 && e.key <= 9 || e.key === '.') {
                calculator.appendNumber(e.key);
                calculator.updateDisplay();
                animateButton(document.querySelector(`[data-number="${e.key}"]`));
            }
            if (e.key === '+' || e.key === '-') {
                calculator.chooseOperation(e.key);
                calculator.updateDisplay();
                animateButton(document.querySelector(`[data-operator="${e.key}"]`));
            }
            if (e.key === '*' || e.key === 'x') {
                calculator.chooseOperation('×');
                calculator.updateDisplay();
                animateButton(document.querySelector(`[data-operator="×"]`));
            }
            if (e.key === '/') {
                e.preventDefault(); // Prevent search finding in browsers
                calculator.chooseOperation('÷');
                calculator.updateDisplay();
                animateButton(document.querySelector(`[data-operator="÷"]`));
            }
            if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculator.compute();
                calculator.updateDisplay();
                animateButton(document.querySelector('[data-action="calculate"]'));
            }
            if (e.key === 'Backspace') {
                calculator.delete();
                calculator.updateDisplay();
                animateButton(document.querySelector('[data-action="delete"]'));
            }
            if (e.key === 'Escape') {
                calculator.clear();
                calculator.updateDisplay();
                animateButton(document.querySelector('[data-action="clear"]'));
            }
            if (e.key === '%') {
                calculator.computePercent();
                calculator.updateDisplay();
                animateButton(document.querySelector('[data-action="percent"]'));
            }
        });

        // Helper to animate button when using keyboard
        function animateButton(btn) {
            if (!btn) return;
            btn.style.transform = 'scale(0.92)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
            }, 100);
        }

        // Haptic feedback for supported mobile devices
        function triggerHapticFeedback() {
            if (navigator.vibrate) {
                navigator.vibrate(50); // 50ms light vibration
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atta Letterpad Generator - اتا لیٹر پیڈ جنریٹر</title>
    
    <!-- 1. Tailwind CSS (اسے پہلے لوڈ ہونا چاہیے) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Tailwind Configuration (اب یہ 100% کام کرے گی) -->
    <script>
        tailwind.config = {
            darkMode: 'class', // یہ کمانڈ ٹیل ونڈ کو بتاتی ہے کہ صرف بٹن سے ہی ڈارک/ڈے موڈ کنٹرول ہو۔
            theme: {
                extend: {
                    fontFamily: {
                        urdu: ['"Noto Nastaliq Urdu"', 'serif'],
                        amiri: ['Amiri', 'serif'],
                    },
                    colors: {
                        primary: '#1d4ed8', // Blue
                        secondary: '#be185d', // Pink/Red
                        darkbg: '#111827',
                        darkpanel: '#1f2937',
                    }
                }
            }
        };
    </script>

    <!-- Google Fonts -->
    <script>
        (async function loadSafeFonts() {
            try {
                const response = await fetch('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Amiri:wght@400;700&display=swap');
                const cssText = await response.text();
                const style = document.createElement('style');
                style.innerHTML = cssText;
                document.head.appendChild(style);
            } catch (error) {
                console.error('Font loading failed:', error);
            }
        })();
        
        // Initial Theme Check
        try {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        } catch (e) {
            console.warn("Storage access blocked.");
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            font-family: 'Amiri', Tahoma, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* A4 Page Styling (Always stays white/light for accurate printing) */
        .a4-container {
            width: 210mm;
            height: 297mm;
            background: white !important; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            margin: 0 auto;
            position: relative;
            box-sizing: border-box;
            font-family: 'Noto Nastaliq Urdu', serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #000; /* Ensure text inside letterpad stays dark */
            transition: none;
        }
        
        /* Force child elements inside a4-container to ignore dark mode overrides */
        .a4-container * {
            color: inherit;
        }

        .page-content {
            flex-grow: 1; position: relative; z-index: 10; display: flex; flex-direction: column;
        }

        .address-text { font-size: 1.35rem; line-height: 2; }

        /* =========================================
           🎨 TEMPLATES CSS
           ========================================= */
        .tpl-1 .header-area { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); padding: 25mm 20mm 15mm 20mm; text-align: center; border-bottom: 8px solid #fbbf24; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); position: relative; }
        .tpl-1 .header-area::after { content: ''; position: absolute; bottom: -12px; left: 10%; right: 10%; height: 4px; background: rgba(251, 191, 36, 0.5); border-radius: 4px; }
        .tpl-1 .b-name { font-size: 3.5rem; font-weight: 700; color: #ffffff; line-height: 1.5; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
        .tpl-1 .b-prop { font-size: 1.4rem; color: #fde68a; margin-top: 15px; letter-spacing: 1px; } 
        .tpl-1 .b-prop span { color: #94a3b8 !important; }
        .tpl-1 .footer-area { background: #0f172a; padding: 12mm 20mm; border-top: 8px solid #fbbf24; color: #ffffff; position: relative; }
        .tpl-1 .footer-area::before { content: ''; position: absolute; top: -12px; left: 10%; right: 10%; height: 4px; background: rgba(251, 191, 36, 0.5); border-radius: 4px; }
        .tpl-1 .b-contact-row { display: flex; justify-content: space-between; font-size: 1.25rem; font-family: 'Noto Nastaliq Urdu', serif; align-items: flex-end; }
        .tpl-1 .b-contact-row .label-text { color: #fbbf24; font-weight: bold; }

        .tpl-2 { flex-direction: row; background: #ffffff; }
        .tpl-2 .sidebar { width: 33%; background: linear-gradient(180deg, #db2777 0%, #7c3aed 50%, #2563eb 100%); color: white; padding: 25mm 15mm; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 10px 0 20px rgba(0,0,0,0.15); z-index: 2; }
        .tpl-2 .main-content { width: 67%; display: flex; flex-direction: column; position: relative; background: #fafafa; }
        .tpl-2 .main-content::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; background: linear-gradient(to top, rgba(37, 99, 235, 0.05), transparent); pointer-events: none; }
        .tpl-2 .b-name { font-size: 3rem; font-weight: 700; line-height: 1.5; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); color: #ffffff; } 
        .tpl-2 .b-prop { font-size: 1.3rem; margin-bottom: 20px; color: #fdf2f8; font-weight: bold; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; width: 100%;}
        .tpl-2 .b-prop span { color: #fbcfe8 !important; }
        .tpl-2 .footer-area { padding: 20mm; margin-top: auto; border-top: 2px solid #e5e7eb; background: #ffffff; z-index: 5;}
        .tpl-2 .b-contact-row { display: flex; flex-direction: column; gap: 15px; font-family: 'Noto Nastaliq Urdu', serif; font-size: 1.25rem; color: #1f2937; }
        .tpl-2 .b-contact-row .label-text { color: #7c3aed; font-weight: bold; }

        .tpl-3 { background: #ffffff; }
        .tpl-3 .header-area { background: linear-gradient(135deg, #064e3b 0%, #10b981 100%); padding: 25mm 20mm 30mm 20mm; text-align: center; color: white; border-bottom-left-radius: 50% 20%; border-bottom-right-radius: 50% 20%; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); position: relative; }
        .tpl-3 .header-area::after { content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; border: 2px dashed rgba(255,255,255,0.3); border-bottom-left-radius: 50% 20%; border-bottom-right-radius: 50% 20%; pointer-events: none; }
        .tpl-3 .b-name { font-size: 3.5rem; font-weight: 700; line-height: 1.5; text-shadow: 2px 2px 0px rgba(0,0,0,0.2); }
        .tpl-3 .b-prop { font-size: 1.4rem; color: #d1fae5; margin-top: 15px; } 
        .tpl-3 .b-prop span { color: #a7f3d0 !important; }
        .tpl-3 .footer-area { background: linear-gradient(to right, #ecfdf5, #ffffff, #ecfdf5); padding: 15mm 20mm; border-top: 3px solid #10b981; margin-top: auto; }
        .tpl-3 .b-contact-row { display: flex; justify-content: space-between; font-size: 1.25rem; color: #064e3b; font-family: 'Noto Nastaliq Urdu', serif; align-items: flex-start; }
        .tpl-3 .b-contact-row .label-text { color: #059669; font-weight: bold; }

        .tpl-4 { background: #fffcf2; }
        .tpl-4 .header-area { background: linear-gradient(90deg, #7f1d1d 0%, #dc2626 100%); color: white; padding: 25mm 20mm; text-align: right; position: relative; overflow: hidden; }
        .tpl-4 .header-area::before { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 0; border-bottom: 40px solid #f59e0b; border-right: 100vw solid transparent; }
        .tpl-4 .header-area::after { content: ''; position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: rgba(255,255,255,0.05); border-radius: 50%; }
        .tpl-4 .b-name { font-size: 3.5rem; font-weight: 700; line-height: 1.5; text-shadow: 2px 2px 5px rgba(0,0,0,0.4); position: relative; z-index: 2;}
        .tpl-4 .b-prop { font-size: 1.4rem; margin-top: 15px; color: #fef3c7; position: relative; z-index: 2;} 
        .tpl-4 .b-prop span { color: #fcd34d !important; }
        .tpl-4 .footer-area { background: #7f1d1d; color: white; padding: 15mm 20mm; margin-top: auto; position: relative; }
        .tpl-4 .footer-area::before { content: ''; position: absolute; top: 0; right: 0; width: 0; height: 0; border-top: 20px solid #f59e0b; border-left: 100vw solid transparent; }
        .tpl-4 .b-contact-row { display: flex; justify-content: space-between; align-items: flex-end; font-size: 1.25rem; font-family: 'Noto Nastaliq Urdu', serif; position: relative; z-index: 2;}
        .tpl-4 .b-contact-row .label-text { color: #fcd34d; }

        .tpl-5 { padding: 10mm; background: #f1f5f9; display: flex; flex-direction: column; }
        .tpl-5 .outer-border { flex-grow: 1; background: #ffffff; border: 2px solid #0f766e; padding: 2mm; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .tpl-5 .inner-border { flex-grow: 1; border: 4px solid #0f766e; padding: 15mm; display: flex; flex-direction: column; position: relative; }
        .tpl-5 .header-area { display: flex; justify-content: center; text-align: center; border-bottom: 3px double #d97706; padding-bottom: 20px; margin-bottom: 10px; background: rgba(15, 118, 110, 0.03); padding-top: 10px; }
        .tpl-5 .b-name { font-size: 3.2rem; font-weight: 700; color: #0f766e; line-height: 1.5; text-shadow: 1px 1px 0px rgba(0,0,0,0.1); }
        .tpl-5 .b-prop { font-size: 1.3rem; color: #d97706; font-weight: bold; margin-top: 15px; } 
        .tpl-5 .b-prop span { color: #64748b !important; font-weight: normal; }
        .tpl-5 .footer-area { border-top: 3px double #d97706; padding-top: 15px; margin-top: auto; background: rgba(15, 118, 110, 0.03); padding-bottom: 10px; padding-left: 10px; padding-right: 10px; }
        .tpl-5 .b-contact-row { display: flex; flex-direction: row; justify-content: space-between; font-size: 1.25rem; font-family: 'Noto Nastaliq Urdu', serif; color: #1e293b; align-items: flex-end; }
        .tpl-5 .b-contact-row .label-text { color: #d97706; font-weight: bold; }

        /* Print Styles */
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .ui-controls, .app-header, .no-print, .theme-toggle { display: none !important; }
            .preview-wrapper { padding: 0 !important; background: transparent !important; transform: none !important; overflow: visible !important; }
            .a4-container { box-shadow: none; margin: 0; padding: 0; width: 100%; height: 100%; page-break-after: avoid; }
            @page { size: A4 portrait; margin: 0; }
        }

        /* Responsive scaling helper */
        .scale-wrapper { transform-origin: top center; transition: transform 0.3s ease; }

        /* Toast notification */
        #toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; z-index: 10000; left: 50%; transform: translateX(-50%); bottom: 30px; font-size: 15px; transition: visibility 0.5s, opacity 0.5s linear; opacity: 0;
        }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>

            </button>

    </header>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
        
        <!-- UI Controls (Sidebar) -->
        <aside class="ui-controls w-full lg:w-96 bg-white dark:bg-gray-800 border-l border-gray-200 dark:border-gray-700 flex flex-col shrink-0 z-10 shadow-[0_0_15px_rgba(0,0,0,0.05)] h-[45%] lg:h-full transition-colors duration-300">
            <div class="p-4 md:p-5 overflow-y-auto flex-1">
                <h2 class="text-lg md:text-xl font-bold mb-4 font-urdu text-primary dark:text-blue-400 border-b dark:border-gray-700 pb-2">معلومات درج کریں</h2>
                
                <div class="space-y-3 md:space-y-4">
                    <!-- Business Name -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 font-urdu">کاروبار کا نام</label>
                        <input type="text" id="input-name" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-primary font-urdu bg-white dark:bg-gray-800 text-gray-800 dark:text-white transition-colors" placeholder="مثال: اتا ٹریڈرز" value="اتا ٹریڈرز" oninput="updatePad()">

                    <!-- Proprietor -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 font-urdu">پروپرائٹر کا نام</label>
                        <input type="text" id="input-prop" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-primary font-urdu bg-white dark:bg-gray-800 text-gray-800 dark:text-white transition-colors" placeholder="مثال: محمد اتا" value="محمد اتا" oninput="updatePad()">

                    <!-- Contact -->

                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 font-urdu">رابطہ نمبر</label>

                    <!-- Address -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 font-urdu">ایڈریس</label>

                            <button onclick="setTemplate(3)" class="tpl-btn h-10 bg-gray-100 dark:bg-gray-700 border-2 border-transparent rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition text-sm font-bold dark:text-white">3</button>
                            <button onclick="setTemplate(4)" class="tpl-btn h-10 bg-gray-100 dark:bg-gray-700 border-2 border-transparent rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition text-sm font-bold dark:text-white">4</button>
                            <button onclick="setTemplate(5)" class="tpl-btn h-10 bg-gray-100 dark:bg-gray-700 border-2 border-transparent rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition text-sm font-bold dark:text-white">5</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="p-3 md:p-5 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 grid grid-cols-3 gap-2 shrink-0 transition-colors duration-300">
                <button onclick="downloadJPG()" class="flex flex-col items-center justify-center p-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-100 dark:hover:bg-gray-600 transition shadow-sm group relative">
                    <svg class="w-5 h-5 md:w-6 md:h-6 text-green-600 dark:text-green-400 mb-1 group-hover:scale-110 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>

                <button onclick="downloadPDF()" class="flex flex-col items-center justify-center p-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-100 dark:hover:bg-gray-600 transition shadow-sm group relative">

    </div>

    <!-- Back to Dashboard Button (Circle on mobile, pill on desktop) -->
    <a href="../index.html" class="no-print fixed bottom-6 left-4 md:bottom-8 md:left-8 z-[90] bg-gray-800 dark:bg-gray-600 text-white p-3 md:py-3 md:px-5 rounded-full flex items-center justify-center shadow-[0_4px_12px_rgba(0,0,0,0.3)] hover:bg-black dark:hover:bg-gray-500 transition-all group" title="Back to Dashboard" dir="ltr">
        <svg class="w-6 h-6 md:w-5 md:h-5 md:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        <span class="hidden md:inline font-sans font-bold text-sm">Dashboard</span>
    </a>

    <!-- Floating Keyboard Toggle Button (Stacked above dashboard button) -->
    <button onclick="toggleKeyboard()" class="no-print fixed bottom-[85px] left-4 md:bottom-[95px] md:left-8 z-[90] bg-primary text-white p-3 md:p-4 rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.4)] hover:bg-blue-800 transition-all flex items-center justify-center group" title="Toggle Keyboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 md:w-7 md:h-7">
            <rect x="2" y="6" width="20" height="12" rx="2" ry="2"></rect>
            <line x1="6" y1="10" x2="6.01" y2="10"></line>
            <line x1="10" y1="10" x2="10.01" y2="10"></line>
            <line x1="14" y1="10" x2="14.01" y2="10"></line>
            <line x1="18" y1="10" x2="18.01" y2="10"></line>
            <line x1="6" y1="14" x2="6.01" y2="14"></line>
            <line x1="18" y1="14" x2="18.01" y2="14"></line>
            <line x1="10" y1="14" x2="14" y2="14"></line>
        </svg>
    </button>

    <div id="virtual-keyboard" class="fixed bottom-0 left-1/2 -translate-x-1/2 translate-y-full w-full md:w-[95%] max-w-[800px] bg-gray-100 dark:bg-gray-800 border-x-0 md:border-x-2 border-t-2 border-primary rounded-t-xl md:rounded-t-2xl shadow-[0_-10px_30px_rgba(0,0,0,0.3)] z-[100] transition-transform duration-300 font-urdu pb-2 md:pb-3 no-print">
        <div class="flex justify-between items-center bg-gray-200 dark:bg-gray-700 px-3 md:px-4 py-2 md:py-3 border-b border-gray-300 dark:border-gray-600 rounded-t-xl">
            <div class="flex items-center gap-2">
                <span class="font-bold text-xs md:text-sm text-primary dark:text-blue-400 font-sans">Urdu Keyboard</span>
                <!-- Voice Typing Indicator -->
                <span id="voice-indicator" class="hidden flex items-center text-xs text-red-500 font-sans font-bold animate-pulse">
                    <span class="w-2 h-2 rounded-full bg-red-500 mr-1"></span> Listening...
                </span>
            </div>
            <button onclick="hideKeyboard()" class="text-red-500 hover:text-red-700 font-bold text-2xl leading-none px-2">&times;</button>
        </div>
        <div id="kb-keys" class="p-1 md:p-2 gap-1 flex flex-col" dir="ltr">
            <!-- Keys generated by JS -->
        </div>
        <div class="text-center text-[10px] md:text-xs text-gray-500 dark:text-gray-400 font-sans pb-1 px-2">
            (Physical typing allowed: a=ا, b=ب | Tap Mic for Voice)
        </div>
    </div>

    <!-- Custom Toast -->
    <div id="toast">Message</div>

    <script>
        let currentTemplate = 1;

        // Custom Toast Function
        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // Dark mode logic (Fixed to handle iframe storage limits smoothly)
        window.toggleDarkMode = function() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            try {
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            } catch (e) {
                console.warn('Storage blocked. Theme toggled visually but will not be saved on reload.');
            }
        };

        const templates = {
            1: `
                <div class="page-content">
                    <div class="header-area">
                        <div class="b-name">{NAME}</div>
                        <div class="b-prop"><span>پروپرائٹر:</span> {PROP}</div>
                    </div>
                    <div style="flex-grow: 1;"></div>
                    <div class="footer-area">
                        <div class="b-contact-row">
                            <div style="flex: 1;"><span class="label-text">ایڈریس:</span> <span class="address-text">{ADDRESS}</span></div>
                            <div style="margin-right: 20px;"><span class="label-text">رابطہ نمبر:</span> <span dir="ltr">{CONTACT}</span></div>
                        </div>
                    </div>
                </div>
            `,
            2: `
                <div class="sidebar">
                    <div class="b-name">{NAME}</div>
                    <div class="b-prop"><span>پروپرائٹر:</span> <br> {PROP}</div>
                </div>
                <div class="main-content">
                    <div style="flex-grow: 1;"></div>
                    <div class="footer-area">
                        <div class="b-contact-row">
                            <div style="flex: 1;"><span class="label-text">ایڈریس:</span><br><span class="address-text">{ADDRESS}</span></div>
                            <div><span class="label-text">رابطہ نمبر:</span><br><span dir="ltr">{CONTACT}</span></div>
                        </div>
                    </div>
                </div>
            `,
            3: `
                <div class="page-content">
                    <div class="header-area">
                        <div class="b-name">{NAME}</div>
                        <div class="b-prop"><span>پروپرائٹر:</span> {PROP}</div>
                    </div>
                    <div style="flex-grow: 1;"></div>
                    <div class="footer-area">
                        <div class="b-contact-row">
                            <div style="flex: 1;"><span class="label-text">ایڈریس:</span> <span class="address-text">{ADDRESS}</span></div>
                            <div style="margin-right: 20px;"><span class="label-text">رابطہ نمبر:</span> <span dir="ltr">{CONTACT}</span></div>
                        </div>
                    </div>
                </div>
            `,
            4: `
                <div class="page-content" style="padding:0;">
                    <div class="header-area">
                        <div class="b-name">{NAME}</div>
                        <div class="b-prop"><span>پروپرائٹر:</span> {PROP}</div>
                    </div>
                    <div style="flex-grow: 1;"></div>
                    <div class="footer-area">
                        <div class="b-contact-row">
                            <div style="flex: 1;"><span class="label-text">ایڈریس:</span> <span class="address-text">{ADDRESS}</span></div>
                            <div style="margin-right: 20px;"><span class="label-text">رابطہ نمبر:</span> <span dir="ltr">{CONTACT}</span></div>
                        </div>
                    </div>
                </div>
            `,
            5: `
                <div class="outer-border">
                    <div class="inner-border">
                        <div class="header-area">
                            <div style="width: 100%;">
                                <div class="b-name">{NAME}</div>
                                <div class="b-prop"><span>پروپرائٹر:</span> {PROP}</div>
                            </div>
                        </div>
                        <div style="flex-grow: 1;"></div>
                        <div class="footer-area">
                            <div class="b-contact-row">
                                <div style="flex: 1;"><span class="label-text">ایڈریس:</span> <span class="address-text">{ADDRESS}</span></div>
                                <div style="margin-right: 20px;"><span class="label-text">رابطہ نمبر:</span> <span dir="ltr">{CONTACT}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            `
        };

        document.addEventListener('DOMContentLoaded', () => {
            updatePad();
            adjustScale();
            window.addEventListener('resize', adjustScale);
            initKeyboard();
            initSpeechRecognition();
        });

        // Function to fit A4 container inside the viewing area
        function adjustScale() {
            const wrapper = document.getElementById('scale-wrapper');
            const scrollArea = document.getElementById('preview-scroll-area');
            const a4Width = 794; // 210mm roughly in px at 96dpi
            
            // Adjust for padding based on screen size
            const isMobile = window.innerWidth < 768;
            const containerWidth = scrollArea.clientWidth - (isMobile ? 16 : 40); 
            
            if (containerWidth < a4Width) {
                const scale = containerWidth / a4Width;
                wrapper.style.transform = `scale(${scale})`;
                const scaledHeight = 1123 * scale; 
                wrapper.style.marginBottom = `-${1123 - scaledHeight}px`; 
            } else {
                wrapper.style.transform = 'scale(1)';
                wrapper.style.marginBottom = '0';
            }
        }

        // Switch Template
        function setTemplate(num) {
            currentTemplate = num;
            const pad = document.getElementById('letterpad');
            pad.className = `a4-container tpl-${num}`;
            
            const buttons = document.querySelectorAll('.tpl-btn');
            buttons.forEach((btn, index) => {
                if (index + 1 === num) {
                    btn.classList.add('border-primary');
                    btn.classList.remove('border-transparent');
                } else {
                    btn.classList.remove('border-primary');
                    btn.classList.add('border-transparent');
                }
            });
            updatePad();
        }

        // Update Pad Content
        function updatePad() {
            const name = document.getElementById('input-name').value || 'کاروبار کا نام';
            const prop = document.getElementById('input-prop').value || 'پروپرائٹر کا نام';
            const contact = document.getElementById('input-contact').value || '';
            const address = document.getElementById('input-address').value || '';
            
            let html = templates[currentTemplate]
                .replace(/{NAME}/g, name)
                .replace(/{PROP}/g, prop)
                .replace(/{CONTACT}/g, contact)
                .replace(/{ADDRESS}/g, address);

            document.getElementById('letterpad').innerHTML = html;
        }

        const kbLayout = {
            default: [
                "ق و ع ر ت ے ء ی ہ پ {bksp}",
                "ا س د ف گ ھ ج ک ل",
                "{shift} ز ش چ ط ب ن م {enter}",
                "{mic} {space}"
            ],
            shift: [
                "ْ ّ ٰ ڑ ٹ َ ئ ِ ۃ ُ {bksp}",
                "آ ص ڈ ؟ غ ح ض خ ،",
                "{shift} ذ ژ ث ظ ں {enter}",
                "{mic} {space}"
            ]
        };

        const phoneticMap = {
            'a': 'ا', 'A': 'آ', 'b': 'ب', 'B': 'بھ', 'c': 'چ', 'C': 'ث',
            'd': 'د', 'D': 'ڈ', 'e': 'ع', 'E': 'ٰ', 'f': 'ف', 'F': 'ف',
            'g': 'گ', 'G': 'غ', 'h': 'ھ', 'H': 'ح', 'i': 'ی', 'I': 'ِ',
            'j': 'ج', 'J': 'ض', 'k': 'ک', 'K': 'خ', 'l': 'ل', 'L': 'ل',
            'm': 'م', 'M': 'ں', 'n': 'ن', 'N': 'ں', 'o': 'ہ', 'O': 'ۃ',
            'p': 'پ', 'P': 'ُ', 'q': 'ق', 'Q': 'ْ', 'r': 'ر', 'R': 'ڑ',
            's': 'س', 'S': 'ص', 't': 'ت', 'T': 'ٹ', 'u': 'ء', 'U': 'ئ',
            'v': 'ط', 'V': 'ظ', 'w': 'و', 'W': 'ّ', 'x': 'ش', 'X': 'ژ',
            'y': 'ے', 'Y': 'َ', 'z': 'ز', 'Z': 'ذ',
            ',': '،', '?': '؟'
        };

        let isShift = false;
        let activeInput = null;
        let recognition;
        let isRecording = false;

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'ur-PK';
                recognition.continuous = false;
                recognition.interimResults = false;

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    insertVoiceText(transcript);
                };

                recognition.onerror = (e) => {
                    showToast("وائس ٹائپنگ میں مسئلہ: " + e.error);
                    stopVoiceIndicator();
                };

                recognition.onend = () => {
                    stopVoiceIndicator();
                };
            }
        }

        function toggleVoice() {
            if(!recognition) {
               showToast("آپ کا براؤزر وائس ٹائپنگ سپورٹ نہیں کرتا۔ Chrome استعمال کریں۔");
               return;
            }
            if (isRecording) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                    startVoiceIndicator();
                } catch(e) {
                    recognition.stop();
                }
            }
        }

        function startVoiceIndicator() {
            isRecording = true;
            document.getElementById('voice-indicator').classList.remove('hidden');
            const micBtnIcon = document.getElementById('mic-icon');
            if(micBtnIcon) { micBtnIcon.classList.add('text-red-600', 'animate-pulse'); }
        }

        function stopVoiceIndicator() {
            isRecording = false;
            document.getElementById('voice-indicator').classList.add('hidden');
            const micBtnIcon = document.getElementById('mic-icon');
            if(micBtnIcon) { micBtnIcon.classList.remove('text-red-600', 'animate-pulse'); }
        }

        function insertVoiceText(text) {
            if (!activeInput) { activeInput = document.getElementById('input-name'); }
            const start = activeInput.selectionStart;
            const end = activeInput.selectionEnd;
            const val = activeInput.value;
            // Add space before text if appending
            const space = (start > 0 && val[start-1] !== ' ') ? ' ' : '';
            const toInsert = space + text + ' ';
            
            activeInput.value = val.substring(0, start) + toInsert + val.substring(end);
            activeInput.selectionStart = activeInput.selectionEnd = start + toInsert.length;
            activeInput.dispatchEvent(new Event('input'));
        }

        function initKeyboard() {
            const inputs = ['input-name', 'input-prop', 'input-address'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                el.addEventListener('focus', function() { showKeyboard(this); });
                
                el.addEventListener('keypress', function(e) {
                    if (e.ctrlKey || e.altKey || e.metaKey) return;
                    const mappedChar = phoneticMap[e.key];
                    if (mappedChar) {
                        e.preventDefault();
                        const start = this.selectionStart;
                        const end = this.selectionEnd;
                        this.value = this.value.substring(0, start) + mappedChar + this.value.substring(end);
                        this.selectionStart = this.selectionEnd = start + mappedChar.length;
                        updatePad();
                    }
                });
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('#virtual-keyboard') && 
                    !e.target.closest('input, textarea') && 
                    !e.target.closest('button[onclick="toggleKeyboard()"]')) {
                    hideKeyboard();
                }
            });
            renderKeyboard();
        }

        function renderKeyboard() {
            const kb = document.getElementById('kb-keys');
            kb.innerHTML = '';
            const currentLayout = isShift ? kbLayout.shift : kbLayout.default;

            currentLayout.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex justify-center gap-1 md:gap-1.5 my-0.5 md:my-1 w-full px-1 md:px-2';
                const keys = row.split(' ');
                
                keys.forEach(key => {
                    const btn = document.createElement('button');
                    // Responsive button sizing and text
                    btn.className = 'bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded md:rounded-md shadow-sm text-lg md:text-xl hover:bg-gray-100 dark:hover:bg-gray-600 active:bg-gray-300 transition font-urdu text-center outline-none select-none touch-manipulation relative overflow-hidden flex-1 min-w-[1.8rem] md:min-w-[2.5rem] max-w-[3.5rem] py-1 md:p-0 text-gray-800 dark:text-white';

                    if (key === '{bksp}') {
                        btn.innerHTML = '⌫';
                        btn.className = 'bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded md:rounded-md shadow-sm hover:bg-red-100 dark:hover:bg-red-800/50 active:bg-red-200 transition text-red-600 dark:text-red-400 font-sans text-lg md:text-xl outline-none select-none touch-manipulation px-2 md:px-3 py-1 md:py-2';
                        btn.onclick = (e) => { e.preventDefault(); handleKey('bksp'); };
                    } else if (key === '{shift}') {
                        btn.innerHTML = '⇧';
                        btn.className = (isShift ? 'bg-primary text-white border-primary ' : 'bg-blue-50 dark:bg-gray-600 text-primary dark:text-blue-300 border-blue-200 dark:border-gray-500 ') + 'border rounded md:rounded-md shadow-sm text-lg md:text-xl outline-none select-none touch-manipulation font-sans px-2 md:px-4 py-1 md:py-2 transition';
                        btn.onclick = (e) => { e.preventDefault(); isShift = !isShift; renderKeyboard(); };
                    } else if (key === '{enter}') {
                        btn.innerHTML = '↵';
                        btn.className = 'bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 rounded md:rounded-md shadow-sm hover:bg-green-100 active:bg-green-200 transition text-green-700 dark:text-green-400 font-sans text-lg md:text-xl outline-none select-none touch-manipulation px-3 md:px-4 py-1 md:py-2';
                        btn.onclick = (e) => { e.preventDefault(); hideKeyboard(); };
                    } else if (key === '{mic}') {
                        btn.innerHTML = `<svg id="mic-icon" class="w-5 h-5 md:w-6 md:h-6 mx-auto ${isRecording?'text-red-600 animate-pulse':'text-gray-600 dark:text-gray-300'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>`;
                        btn.className = 'bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded md:rounded-md shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600 transition outline-none select-none touch-manipulation w-[15%] py-2 md:py-3';
                        btn.onclick = (e) => { e.preventDefault(); toggleVoice(); };
                    } else if (key === '{space}') {
                        btn.innerHTML = 'Space';
                        btn.className = 'bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded md:rounded-md shadow-sm hover:bg-gray-100 dark:hover:bg-gray-600 active:bg-gray-300 transition font-sans text-xs md:text-sm outline-none select-none touch-manipulation w-[50%] py-2 md:py-3 text-gray-800 dark:text-gray-200';
                        btn.onclick = (e) => { e.preventDefault(); handleKey(' '); };
                    } else {
                        // Reverse mapping to find English character
                        let engChar = "";
                        for (let eng in phoneticMap) {
                            if (phoneticMap[eng] === key) {
                                if ((isShift && eng === eng.toUpperCase()) || (!isShift && eng === eng.toLowerCase())) {
                                    engChar = eng; break;
                                }
                            }
                        }
                        if (!engChar) {
                            for (let eng in phoneticMap) {
                                if (phoneticMap[eng] === key) { engChar = eng; break; }
                            }
                        }

                        // Bilingual Button Output
                        btn.innerHTML = `
                            <div class="flex flex-col items-center justify-center min-h-[2.5rem] md:min-h-[3.2rem]">
                                <span class="absolute top-0 md:top-0.5 left-1 md:left-1.5 text-[8px] md:text-[10px] font-sans font-bold text-gray-400 dark:text-gray-500">${engChar}</span>
                                <span class="mt-1.5 md:mt-2 text-[18px] md:text-[22px] leading-none text-gray-800 dark:text-white">${key}</span>
                            </div>
                        `;
                        btn.onclick = (e) => { e.preventDefault(); handleKey(key); };
                    }
                    btn.onmousedown = (e) => e.preventDefault();
                    rowDiv.appendChild(btn);
                });
                kb.appendChild(rowDiv);
            });
        }

        function handleKey(char) {
            if (!activeInput) { activeInput = document.getElementById('input-name'); }
            const start = activeInput.selectionStart;
            const end = activeInput.selectionEnd;
            const val = activeInput.value;

            if (char === 'bksp') {
                if (start > 0 || start !== end) {
                    const removeStart = start === end ? start - 1 : start;
                    activeInput.value = val.substring(0, removeStart) + val.substring(end);
                    activeInput.selectionStart = activeInput.selectionEnd = removeStart;
                }
            } else {
                activeInput.value = val.substring(0, start) + char + val.substring(end);
                activeInput.selectionStart = activeInput.selectionEnd = start + char.length;
            }
            activeInput.dispatchEvent(new Event('input'));
        }

        function toggleKeyboard() {
            const kb = document.getElementById('virtual-keyboard');
            if (kb.classList.contains('translate-y-full')) {
                let targetInput = document.getElementById('input-name');
                const focused = document.activeElement;
                if (focused && (focused.tagName === 'INPUT' || focused.tagName === 'TEXTAREA')) {
                    targetInput = focused;
                }
                showKeyboard(targetInput);
            } else {
                hideKeyboard();
            }
        }

        function showKeyboard(inputElem) {
            activeInput = inputElem;
            document.getElementById('virtual-keyboard').classList.remove('translate-y-full');
            isShift = false; 
            renderKeyboard();
        }

        function hideKeyboard() {
            document.getElementById('virtual-keyboard').classList.add('translate-y-full');
            activeInput = null;
        }

        async function downloadPDF() {
            const element = document.getElementById('letterpad');
            const wrapper = document.getElementById('scale-wrapper');
            const originalTransform = wrapper.style.transform;
            wrapper.style.transform = 'scale(1)';

            try {
                showToast("Generating PDF... Please wait.");
                const dataUrl = await htmlToImage.toJpeg(element, { quality: 1.0, pixelRatio: 2 });
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                const pdfWidth = doc.internal.pageSize.getWidth();
                const pdfHeight = doc.internal.pageSize.getHeight();
                
                doc.addImage(dataUrl, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                doc.save('Atta-Letterpad.pdf');
                showToast("PDF Downloaded successfully!");
            } catch (error) {
                console.error('Error generating PDF:', error);
                showToast("PDF generation error. Try again.");
            } finally {
                wrapper.style.transform = originalTransform;
            }
        }

        async function downloadJPG() {
            const element = document.getElementById('letterpad');
            const wrapper = document.getElementById('scale-wrapper');
            const originalTransform = wrapper.style.transform;
            wrapper.style.transform = 'scale(1)';

            try {
                showToast("Generating Image... Please wait.");
                const dataUrl = await htmlToImage.toJpeg(element, { quality: 1.0, pixelRatio: 2 });
                const link = document.createElement('a');
                link.download = 'Atta-Letterpad.jpg';
                link.href = dataUrl;
                link.click();
                showToast("Image Downloaded successfully!");
            } catch (error) {
                console.error('Error generating JPG:', error);
                showToast("Image generation error. Try again.");
            } finally {
                wrapper.style.transform = originalTransform;
            }
        }
    </script>
</body>
